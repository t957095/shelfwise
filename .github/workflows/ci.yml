name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with Ruff
        run: |
          ruff check backend/
          ruff format --check backend/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "No tests directory yet"

      - name: Check imports
        run: |
          python -c "from backend.main import app; from backend.scraper import UPCScraper; from backend.foundry_agent import ProductReasoningAgent; print('All imports OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shelfwise:latest .

      - name: Test Docker container
        run: |
          docker run -d --name shelfwise-test -p 8000:8000 shelfwise:latest
          sleep 10
          curl -f http://localhost:8000/api/health || exit 1
          docker stop shelfwise-test
          docker rm shelfwise-test
